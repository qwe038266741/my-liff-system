<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿毛代儲🐼快速下單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { 
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
      text-align: center; 
      padding: 20px; 
      background-color: #0f1115; 
      color: #e2e8f0; 
      margin: 0;
    }
    h2 {
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 20px;
      text-shadow: 0 0 10px rgba(6, 199, 85, 0.2);
    }
    #pictureUrl { 
      width: 85px; 
      height: 85px;
      border-radius: 50%; 
      margin-top: 15px; 
      display: none; 
      border: 3px solid #06C755;
      box-shadow: 0 0 15px rgba(6, 199, 85, 0.4); 
    }
    #displayName {
      font-size: 16px;
      color: #a0aec0;
      font-weight: 500;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    /* 頂部快捷按鈕列 */
    .top-btn-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .top-btn {
      width: auto !important;
      padding: 8px 18px !important;
      margin-top: 0 !important;
      font-size: 13px !important;
      background: #2d3748 !important;
      color: #a0aec0 !important;
      box-shadow: none !important;
      border-radius: 20px !important;
    }
    .top-btn:hover { background: #3a4a63 !important; color: #ffffff !important; }
    .top-btn.active { background: #06C755 !important; color: #fff !important; }

    .order-box { 
      margin: 20px auto; 
      padding: 30px 25px; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      border-radius: 16px; 
      max-width: 420px; 
      background: linear-gradient(145deg, #161920, #1a1f29); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
      box-sizing: border-box;
    }
    .input-group { margin-top: 20px; text-align: left; }
    .input-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #94a3b8; letter-spacing: 0.5px; }
    select, input { 
      width: 100%; 
      padding: 12px 15px; 
      font-size: 15px; 
      border-radius: 8px; 
      background-color: #0f1115;
      border: 1px solid #2d3748; 
      color: #ffffff;
      transition: all 0.3s ease;
      box-sizing: border-box;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #06C755;
      box-shadow: 0 0 10px rgba(6, 199, 85, 0.3);
    }
    input[readonly] { background-color: #1a1f29; color: #718096; cursor: not-allowed; border-color: #2d3748; }
    input[readonly]:focus { border-color: #2d3748; box-shadow: none; }
    .price-hint { margin-top: 8px; font-size: 15px; color: #00ff66; font-weight: 700; text-shadow: 0 0 5px rgba(0,255,102,0.2); }
    button { 
      margin-top: 25px; 
      width: 100%; 
      padding: 14px; 
      background: linear-gradient(90deg, #06b34c, #06C755);
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
      transition: all 0.2s ease; 
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(6, 199, 85, 0.5); }
    button:active { transform: translateY(1px); }
    button:disabled { background: #2d3748; color: #4a5568; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #2d3748; color: #a0aec0; margin-top: 12px; box-shadow: none; }
    .btn-secondary:hover { background: #3a4a63; color: #ffffff; box-shadow: none; }

    /* 進度條 */
    .progress-bar-wrap {
      max-width: 420px;
      margin: 0 auto 4px;
      display: none;
    }
    .progress-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      flex: 1;
    }
    .step-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1e2533;
      border: 2px solid #2d3748;
      color: #4a5568;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: all 0.35s ease;
    }
    .step-circle.done {
      background: #06C755;
      border-color: #06C755;
      color: #fff;
      box-shadow: 0 0 10px rgba(6,199,85,0.5);
    }
    .step-circle.active {
      background: #0f1115;
      border-color: #06C755;
      color: #06C755;
      box-shadow: 0 0 12px rgba(6,199,85,0.35);
    }
    .step-label {
      font-size: 11px;
      margin-top: 6px;
      color: #4a5568;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: color 0.35s;
      white-space: nowrap;
    }
    .step-label.active { color: #06C755; }
    .step-label.done { color: #a0e6c0; }
    .progress-line {
      flex: 1;
      height: 2px;
      background: #2d3748;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .progress-line-fill {
      height: 100%;
      background: #06C755;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 6px rgba(6,199,85,0.6);
    }

    /* 錢包區塊樣式 */
    .wallet-balance-card {
      background: linear-gradient(135deg, #064e26, #0a7a3a);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid rgba(6,199,85,0.3);
      box-shadow: 0 4px 20px rgba(6,199,85,0.15);
    }
    .wallet-balance-label { font-size: 13px; color: #a0e6c0; margin-bottom: 8px; letter-spacing: 1px; }
    .wallet-balance-amount { font-size: 42px; font-weight: 800; color: #ffffff; letter-spacing: 2px; }
    .wallet-balance-unit { font-size: 18px; color: #a0e6c0; margin-left: 4px; }

    .wallet-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #718096;
      letter-spacing: 1px;
      text-align: left;
      margin: 20px 0 10px;
      text-transform: uppercase;
    }

    .topup-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 5px;
    }
    .topup-btn {
      margin-top: 0;
      padding: 12px 5px;
      font-size: 14px;
      font-weight: 700;
      background: #1a1f29;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-radius: 10px;
      box-shadow: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topup-btn:hover { border-color: #06C755; color: #06C755; background: #1a1f29; box-shadow: none; transform: none; }
    .topup-btn.selected { border-color: #06C755; color: #06C755; background: rgba(6,199,85,0.08); box-shadow: none; transform: none; }

    .tx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid #1e2533;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-left { text-align: left; }
    .tx-desc { font-size: 14px; color: #e2e8f0; font-weight: 600; }
    .tx-time { font-size: 12px; color: #4a5568; margin-top: 3px; }
    .tx-amount { font-size: 16px; font-weight: 800; }
    .tx-amount.credit { color: #06C755; }
    .tx-amount.debit { color: #fc8181; }

    /* 餘額不足警示 */
    .balance-warning {
      background: rgba(252,129,74,0.1);
      border: 1px solid rgba(252,129,74,0.4);
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 13px;
      color: #fca274;
      text-align: left;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <h2>歡迎來到 🐼 阿毛工作室</h2>
  <img id="pictureUrl" src="" alt="Profile Picture">
  <h3 id="displayName">正在載入 LINE 身分資訊...</h3>

  <div class="top-btn-row">
    <button class="top-btn" onclick="showPage('step1')">🛒 下單</button>
    <button class="top-btn" onclick="showPage('walletPage')">💰 我的錢包</button>
    <button class="top-btn" onclick="showPage('historyPage')">📋 歷史訂單</button>
  </div>

  <!-- 進度條（只在下單流程顯示） -->
  <div class="progress-bar-wrap" id="progressBarWrap">
    <div class="progress-steps">
      <div class="progress-step">
        <div class="step-circle active" id="sc1">1</div>
        <div class="step-label active" id="sl1">選擇商品</div>
      </div>
      <div class="progress-line"><div class="progress-line-fill" id="pl1"></div></div>
      <div class="progress-step">
        <div class="step-circle" id="sc2">2</div>
        <div class="step-label" id="sl2">填寫資料</div>
      </div>
      <div class="progress-line"><div class="progress-line-fill" id="pl2"></div></div>
      <div class="progress-step">
        <div class="step-circle" id="sc3">✓</div>
        <div class="step-label" id="sl3">送出完成</div>
      </div>
    </div>
  </div>

  <!-- ===== Step 1 ===== -->
  <div id="step1" class="order-box">
    <div class="input-group">
      <label>請選擇遊戲/項目</label>
      <select id="gameSelect">
        <option value="" disabled selected>請選擇項目...</option>
        <option value="特戰英豪">特戰英豪</option>
        <option value="抖音">抖音</option>
        <option value="Steam點數卡">Steam點數卡</option>
        <option value="YouTube Premium">YouTube Premium</option>
      </select>
    </div>
    <div class="input-group">
      <label>請選擇伺服器/版本</label>
      <select id="serverSelect">
        <option value="" disabled selected>請先選擇項目...</option>
      </select>
    </div>
    <div class="input-group" id="amountSelectGroup">
      <label>請選擇面額</label>
      <select id="amountSelect">
        <option value="" disabled selected>請先選擇伺服器...</option>
      </select>
    </div>
    <div class="input-group" id="customAmountGroup" style="display: none;">
      <label id="customAmountLabel">請輸入欲購買數量</label>
      <input type="number" id="customAmountInput" placeholder="請輸入數量" min="1">
      <div class="price-hint" id="customPriceCalc">目前金額：$0</div>
    </div>
    <div class="input-group">
      <label>請選擇支付方式</label>
      <select id="paymentSelect">
        <option value="" disabled selected>請選擇支付方式...</option>
        <option value="錢包餘額支付">💰 錢包餘額支付</option>
        <option value="網銀轉帳">網銀轉帳 $0-$15</option>
        <option value="LINE好友轉帳">LINE好友轉帳 $0</option>
        <option value="街口轉帳">街口轉帳 $0</option>
        <option value="7-11條碼繳費">7-11條碼繳費 $0</option>
        <option value="全家條碼繳費">全家條碼繳費 $15</option>
        <option value="萊爾富條碼繳費">萊爾富條碼繳費 $15</option>
      </select>
    </div>
    <!-- 餘額不足警示 -->
    <div class="balance-warning" id="balanceWarning">
      ⚠️ 錢包餘額不足，無法使用餘額支付。請先前往「我的錢包」儲值，或選擇其他支付方式。
    </div>
    <button onclick="goToStep2()">下一步，填寫資料</button>
  </div>

  <!-- ===== Step 2 ===== -->
  <div id="step2" class="order-box" style="display: none;">
    <h3 style="margin-top: 0; color: #06C755; font-weight: 700;">填寫代儲資訊</h3>
    <p id="orderSummary" style="font-size: 14px; color: #a0aec0; font-weight: 600; margin-bottom: 25px; line-height: 1.5;"></p>
    <div id="dynamicForm"></div>
    <button id="submitBtn" onclick="submitOrder()">確認送出訂單</button>
    <button class="btn-secondary" onclick="showPage('step1')">回上一頁修改</button>
  </div>

  <!-- ===== 我的錢包 ===== -->
  <div id="walletPage" class="order-box" style="display: none;">
    <div class="wallet-balance-card">
      <div class="wallet-balance-label">💰 錢包餘額</div>
      <div>
        <span class="wallet-balance-amount" id="walletBalanceDisplay">--</span>
        <span class="wallet-balance-unit">元</span>
      </div>
    </div>

    <div class="wallet-section-title">儲值申請</div>
    <div class="topup-grid">
      <button class="topup-btn" onclick="selectTopup(this, 100)">$100</button>
      <button class="topup-btn" onclick="selectTopup(this, 200)">$200</button>
      <button class="topup-btn" onclick="selectTopup(this, 300)">$300</button>
      <button class="topup-btn" onclick="selectTopup(this, 500)">$500</button>
      <button class="topup-btn" onclick="selectTopup(this, 1000)">$1000</button>
      <button class="topup-btn" onclick="selectTopup(this, 2000)">$2000</button>
    </div>
    <div class="input-group" style="margin-top:12px;">
      <label>或輸入自訂金額</label>
      <input type="number" id="customTopupInput" placeholder="請輸入儲值金額" min="1" oninput="clearTopupSelection()">
    </div>
    <button id="topupSubmitBtn" onclick="submitTopup()">申請儲值</button>

    <div class="wallet-section-title" style="margin-top:28px;">交易紀錄</div>
    <div id="walletTxList">
      <p style="color:#4a5568; font-size:14px; text-align:center; padding:20px 0;">載入中...</p>
    </div>

    <button class="btn-secondary" onclick="showPage('step1')">返回首頁</button>
  </div>

  <!-- ===== 歷史訂單 ===== -->
  <div id="historyPage" class="order-box" style="display: none;">
    <h3 style="margin-top: 0; color: #06C755; font-weight: 700;">歷史訂單</h3>
    <div id="historyList" style="text-align:left;">
      <p style="color:#a0aec0; font-size:14px;">載入中...</p>
    </div>
    <button class="btn-secondary" onclick="showPage('step1')">返回首頁</button>
  </div>

  <script>
    const myLiffId = "2010516204-8RHWuHLT"; 
    const apiUrl = "https://script.google.com/macros/s/AKfycbwAKoBhgKUU3EL9VZHZVPOCwfyOSZAT94w_R-B0-qtBN4AU9SXKTrP7l3wzTa1mugWf/exec"; 
    let userProfile = null;
    let currentBalance = 0;
    let selectedTopupAmount = 0;

    const serverOptions = {
      "特戰英豪": ["全服", "菲服"],
      "抖音": ["大陸版", "國際版"],
      "Steam點數卡": ["無須選擇"],
      "YouTube Premium": ["年繳方案"]
    };

    const amountOptions = {
      "全服": [
        "16350VP = $4100", "13050VP = $3300", "11000VP = $2700", "9000VP = $2400", 
        "7400VP = $2000", "5350VP = $1400", "3650VP = $1000", "2050VP = $600", "1000VP = $300"
      ],
      "菲服": [
        "【 Riot ID直充 】", "16350VP = $3700", "13050VP = $3000", "11000VP = $2500", 
        "9000VP = $2200", "7400VP = $1800", "5350VP = $1300", "3650VP = $1000", 
        "2050VP = $600", "1000VP = $300", "475VP = $150",
        "【 序號 】", "6710VP = $1450", "3250VP = $800", "1900VP = $500", "1260VP = $350", "600VP = $200", "355VP = $150"
      ],
      "無須選擇": [
        "2000點 = $2200", "1000點 = $1100", "800點 = $880", "500點 = $550", 
        "400點 = $440", "300點 = $330", "200點 = $220", "150點 = $165", "100點 = $110"
      ],
      "年繳方案": [
        "一年 = $1500"
      ]
    };

    const serialAmounts = ["6710VP = $1450", "3250VP = $800", "1900VP = $500", "1260VP = $350", "600VP = $200", "355VP = $150"];

    // ===== 頁面切換 =====
    const allPages = ["step1", "step2", "walletPage", "historyPage"];
    function showPage(pageId) {
      allPages.forEach(id => {
        document.getElementById(id).style.display = "none";
      });
      document.getElementById(pageId).style.display = "block";

      // 切換頂部按鈕高亮
      document.querySelectorAll('.top-btn').forEach(btn => btn.classList.remove('active'));
      const btnMap = { step1: 0, walletPage: 1, historyPage: 2 };
      if (btnMap[pageId] !== undefined) {
        document.querySelectorAll('.top-btn')[btnMap[pageId]].classList.add('active');
      }

      // 進度條顯示控制
      const orderPages = ["step1", "step2"];
      const progressWrap = document.getElementById("progressBarWrap");
      if (orderPages.includes(pageId)) {
        progressWrap.style.display = "block";
        setProgressStep(pageId === "step1" ? 1 : 2);
      } else {
        progressWrap.style.display = "none";
      }

      if (pageId === 'walletPage') loadWallet();
      if (pageId === 'historyPage') loadHistory();
    }

    // ===== 進度條控制 =====
    function setProgressStep(step) {
      // step: 1=選擇商品, 2=填寫資料, 3=送出完成
      const circles = [null, document.getElementById("sc1"), document.getElementById("sc2"), document.getElementById("sc3")];
      const labels  = [null, document.getElementById("sl1"), document.getElementById("sl2"), document.getElementById("sl3")];
      const lines   = [document.getElementById("pl1"), document.getElementById("pl2")];

      circles.slice(1).forEach((c, i) => {
        c.className = "step-circle";
        labels[i+1].className = "step-label";
      });

      for (let i = 1; i <= 3; i++) {
        if (i < step) {
          circles[i].classList.add("done");
          circles[i].innerHTML = "✓";
          labels[i].classList.add("done");
        } else if (i === step) {
          circles[i].classList.add("active");
          circles[i].innerHTML = i < 3 ? String(i) : "✓";
          labels[i].classList.add("active");
        } else {
          circles[i].innerHTML = i < 3 ? String(i) : "✓";
        }
      }

      lines[0].style.width = step > 1 ? "100%" : "0%";
      lines[1].style.width = step > 2 ? "100%" : "0%";
    }

    function setProgressDone() {
      setProgressStep(3);
    }

    // ===== LIFF 初始化 =====
    async function initializeLiff() {
      try {
        await liff.init({ liffId: myLiffId });
        if (liff.isLoggedIn()) {
          userProfile = await liff.getProfile();
          document.getElementById("displayName").innerText = "你好，" + userProfile.displayName;
          document.getElementById("pictureUrl").src = userProfile.pictureUrl;
          document.getElementById("pictureUrl").style.display = "inline-block";
        } else {
          liff.login();
        }
      } catch (err) {
        console.error("LIFF 初始化失敗", err);
        document.getElementById("displayName").innerText = "系統初始化失敗，請檢查網路或設定";
      }
    }

    // ===== 面額解析（從字串取出數字金額）=====
    function parseAmountPrice(amountStr) {
      const match = amountStr.match(/\$(\d+)/);
      return match ? parseInt(match[1]) : 0;
    }

    // ===== 餘額不足偵測 =====
    document.addEventListener("change", function(e) {
      if (e.target.id === "paymentSelect" || e.target.id === "amountSelect") {
        checkBalanceWarning();
      }
    });
    function checkBalanceWarning() {
      const payment = document.getElementById("paymentSelect").value;
      const warning = document.getElementById("balanceWarning");
      if (payment !== "錢包餘額支付") { warning.style.display = "none"; return; }

      const amountStr = document.getElementById("amountSelect").value;
      if (!amountStr) { warning.style.display = "none"; return; }

      const price = parseAmountPrice(amountStr);
      if (price > 0 && currentBalance < price) {
        warning.style.display = "block";
      } else {
        warning.style.display = "none";
      }
    }

    // ===== 下單流程 =====
    document.getElementById("gameSelect").addEventListener("change", function() {
      const game = this.value;
      const serverSelect = document.getElementById("serverSelect");
      serverSelect.innerHTML = '<option value="" disabled selected>請選擇伺服器/版本...</option>';
      document.getElementById("amountSelect").innerHTML = '<option value="" disabled selected>請先選擇伺服器...</option>';
      document.getElementById("amountSelectGroup").style.display = "block";
      document.getElementById("customAmountGroup").style.display = "none";
      document.getElementById("customAmountInput").value = "";
      document.getElementById("customPriceCalc").innerText = "目前金額：$0";
      document.getElementById("balanceWarning").style.display = "none";

      if (game && serverOptions[game]) {
        serverOptions[game].forEach(server => {
          let option = document.createElement("option");
          option.value = server;
          option.text = server;
          serverSelect.appendChild(option);
        });
        if (serverOptions[game].length === 1) {
          serverSelect.value = serverOptions[game][0];
          serverSelect.dispatchEvent(new Event('change'));
        }
      }
    });

    document.getElementById("serverSelect").addEventListener("change", function() {
      const game = document.getElementById("gameSelect").value;
      const server = this.value;
      const amountSelect = document.getElementById("amountSelect");
      amountSelect.innerHTML = '<option value="" disabled selected>請選擇面額...</option>';
      document.getElementById("customAmountInput").value = "";
      document.getElementById("customPriceCalc").innerText = "目前金額：$0";

      if (game === "抖音") {
        document.getElementById("amountSelectGroup").style.display = "none";
        document.getElementById("customAmountGroup").style.display = "block";
        if (server === "大陸版") {
          document.getElementById("customAmountLabel").innerText = "請輸入欲購買鑽石數量 (限100鑽石/$50為單位)";
          document.getElementById("customAmountInput").placeholder = "例如：100, 200, 500...";
        } else if (server === "國際版") {
          document.getElementById("customAmountLabel").innerText = "請輸入欲購買金幣數量 (限140金幣/$50為單位)";
          document.getElementById("customAmountInput").placeholder = "例如：140, 280, 560...";
        }
      } else {
        document.getElementById("amountSelectGroup").style.display = "block";
        document.getElementById("customAmountGroup").style.display = "none";
        if (server && amountOptions[server]) {
          amountOptions[server].forEach(amount => {
            let option = document.createElement("option");
            option.value = amount;
            option.text = amount;
            if (amount.startsWith("【")) {
              option.disabled = true;
              option.style.fontWeight = "bold";
              option.style.color = "#555";
            }
            amountSelect.appendChild(option);
          });
        }
      }
    });

    document.getElementById("customAmountInput").addEventListener("input", function() {
      const server = document.getElementById("serverSelect").value;
      const val = parseInt(this.value) || 0;
      let price = 0;
      if (server === "大陸版") { price = Math.floor(val / 100) * 50; }
      else if (server === "國際版") { price = Math.floor(val / 140) * 50; }
      document.getElementById("customPriceCalc").innerText = `目前金額：$${price}`;
    });

    function goToStep2() {
      const game = document.getElementById("gameSelect").value;
      const server = document.getElementById("serverSelect").value;
      const payment = document.getElementById("paymentSelect").value;
      let amount = "";

      if (game === "抖音") {
        const inputVal = parseInt(document.getElementById("customAmountInput").value) || 0;
        if (inputVal <= 0) { alert("⚠️ 請輸入正確的購買數量！"); return; }
        if (server === "大陸版") {
          if (inputVal % 100 !== 0) { alert("⚠️ 大陸版限制必須以 100 鑽石為單位遞增輸入！"); return; }
          amount = `${inputVal}鑽石 = $${(inputVal / 100) * 50}`;
        } else if (server === "國際版") {
          if (inputVal % 140 !== 0) { alert("⚠️ 國際版限制必須以 140 金幣為單位遞增輸入！"); return; }
          amount = `${inputVal}金幣 = $${(inputVal / 140) * 50}`;
        }
      } else {
        amount = document.getElementById("amountSelect").value;
      }

      if (!game || !server || !amount || !payment) {
        alert("⚠️ 請確認所有選項和面額皆已選擇/填寫完整！");
        return;
      }

      // 餘額不足攔截
      if (payment === "錢包餘額支付") {
        const price = parseAmountPrice(amount);
        if (price > currentBalance) {
          alert(`⚠️ 錢包餘額不足！\n目前餘額：$${currentBalance}\n商品金額：$${price}\n\n請先儲值或選擇其他支付方式。`);
          return;
        }
      }

      document.getElementById("orderSummary").innerHTML = `項目：${game}<br>版本：${server}<br>面額：${amount}<br>支付：${payment}`;
      const formContainer = document.getElementById("dynamicForm");

      if (game === "特戰英豪") {
        if (server === "全服") {
          formContainer.innerHTML = `
            <div class="input-group"><label>登入方式</label><input type="text" id="loginMethod" value="Riot" readonly></div>
            <div class="input-group"><label>帳號</label><input type="text" id="account" placeholder="請輸入 Riot 帳號"></div>
            <div class="input-group"><label>密碼</label><input type="text" id="password" placeholder="請輸入密碼"></div>
            <div class="input-group"><label>區服</label><input type="text" id="region" placeholder="請輸入區服"></div>
            <div class="input-group"><label>名稱</label><input type="text" id="characterName" placeholder="請輸入遊戲名稱"></div>
          `;
        } else if (server === "菲服") {
          if (serialAmounts.includes(amount)) {
            formContainer.innerHTML = `
              <div style="padding: 15px; color: #a0aec0; font-size: 14px; line-height: 1.6; background:#1a1f29; border-radius:8px; border:1px dashed #4a5568;">
                📦 您選擇的是 <b style="color: #ff9800;">【序號商品】</b>。<br>
                免填遊戲帳密或 Riot ID！<br>
                請點下方按鈕送出，由客服發送支付方式。
              </div>
            `;
          } else {
            formContainer.innerHTML = `
              <div class="input-group"><label>Riot ID</label><input type="text" id="riotId" placeholder="格式如：XXX#XXX"></div>
            `;
          }
        }
      } else if (game === "抖音") {
        if (server === "大陸版") {
          formContainer.innerHTML = `
            <div class="input-group">
              <label>抖音號</label>
              <input type="text" id="douyinId" placeholder="請輸入您的大陸版抖音號">
            </div>
          `;
        } else if (server === "國際版") {
          formContainer.innerHTML = `
            <div class="input-group">
              <label>綁定電子信箱</label>
              <input type="text" id="douyinEmail" placeholder="請輸入 TikTok 綁定信箱">
            </div>
            <div class="input-group">
              <label>密碼</label>
              <input type="text" id="douyinPassword" placeholder="請輸入 TikTok 密碼">
            </div>
          `;
        }
      } else if (game === "Steam點數卡") {
        formContainer.innerHTML = `
          <div style="padding: 15px; color: #a0aec0; font-size: 14px; line-height: 1.6; background:#1a1f29; border-radius:8px; border:1px dashed #4a5568;">
            📦 您選擇的是 <b style="color: #ff9800;">【Steam 點數卡序號】</b>。<br>
            免填遊戲帳密或 ID！<br>
            請點下方按鈕送出，由客服為您發送。
          </div>
        `;
      } else if (game === "YouTube Premium") {
        formContainer.innerHTML = `
          <div class="input-group"><label>登入方式</label><input type="text" id="loginMethod" value="Google" readonly></div>
          <div class="input-group"><label>帳號</label><input type="text" id="account" placeholder="請輸入Google帳號"></div>
          <div class="input-group"><label>密碼</label><input type="text" id="password" placeholder="請輸入Google密碼"></div>
          <div class="input-group"><label>備用碼</label><input type="text" id="backupCode" placeholder="請輸入任何一組 8 位數備用碼"></div>
        `;
      }

      formContainer.dataset.resolvedAmount = amount;
      showPage('step2');
    }

    async function submitOrder() {
      if (!userProfile) { alert("尚未成功讀取 LINE 身分，無法下單！"); return; }

      const game = document.getElementById("gameSelect").value;
      const server = document.getElementById("serverSelect").value;
      const formContainer = document.getElementById("dynamicForm");
      const amount = formContainer.dataset.resolvedAmount;
      const payment = document.getElementById("paymentSelect").value;

      // 再次確認餘額（防止切換頁面後餘額變動）
      if (payment === "錢包餘額支付") {
        const price = parseAmountPrice(amount);
        if (price > currentBalance) {
          alert(`⚠️ 錢包餘額不足，訂單無法送出！\n目前餘額：$${currentBalance}\n商品金額：$${price}`);
          return;
        }
      }

      let payload = {
        userId: userProfile.userId,
        displayName: userProfile.displayName,
        game, server, amount, payment
      };

      if (game === "特戰英豪") {
        if (server === "全服") {
          payload.loginMethod = document.getElementById("loginMethod").value;
          payload.account = document.getElementById("account").value.trim();
          payload.password = document.getElementById("password").value.trim();
          payload.region = document.getElementById("region").value.trim();
          payload.characterName = document.getElementById("characterName").value.trim();
          if (!payload.account || !payload.password || !payload.region || !payload.characterName) {
            alert("⚠️ 請確認所有欄位皆已填寫完整！"); return;
          }
        } else if (server === "菲服") {
          if (!serialAmounts.includes(amount)) {
            payload.riotId = document.getElementById("riotId").value.trim();
            if (!payload.riotId) { alert("⚠️ 請填寫 Riot ID！"); return; }
          } else {
            payload.riotId = "購買序號商品";
          }
        }
      } else if (game === "抖音") {
        if (server === "大陸版") {
          var douyinId = document.getElementById("douyinId").value.trim();
          if (!douyinId) { alert("⚠️ 請填寫抖音號！"); return; }
          payload.account = douyinId;
          payload.loginMethod = "抖音號充值";
        } else if (server === "國際版") {
          var email = document.getElementById("douyinEmail").value.trim();
          var pwd = document.getElementById("douyinPassword").value.trim();
          if (!email || !pwd) { alert("⚠️ 請確認信箱與密碼皆已填寫！"); return; }
          payload.account = email;
          payload.password = pwd;
          payload.loginMethod = "信箱登入";
        }
      } else if (game === "Steam點數卡") {
        payload.loginMethod = "Steam序號發放";
        payload.account = "購買序號商品";
      } else if (game === "YouTube Premium") {
        payload.loginMethod = document.getElementById("loginMethod").value;
        payload.account = document.getElementById("account").value.trim();
        payload.password = document.getElementById("password").value.trim();
        payload.backupCode = document.getElementById("backupCode").value.trim();
        if (!payload.account || !payload.password || !payload.backupCode) {
          alert("⚠️ 請確認所有欄位皆已填寫完整！"); return;
        }
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.innerText = "訂單傳送中...";
      submitBtn.disabled = true;

      try {
        await fetch(apiUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });

        // 若使用餘額支付，本地先更新餘額顯示
        if (payment === "錢包餘額支付") {
          const price = parseAmountPrice(amount);
          currentBalance = Math.max(0, currentBalance - price);
        }
        // 進度條顯示第三步「送出完成」，短暫停留後關閉或回首頁
        setProgressDone();
        await new Promise(r => setTimeout(r, 1200));
        alert("🎉 訂單已成功送出！\n客服正在處理中，請稍候。");
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          showPage('step1');
        }
      } catch (error) {
        console.error("傳送過程中發生錯誤:", error);
        alert("傳送失敗，請稍後再試！");
      } finally {
        submitBtn.innerText = "確認送出訂單";
        submitBtn.disabled = false;
      }
    }

    // ===== 錢包 =====
    async function loadWallet() {
      if (!userProfile) return;
      document.getElementById("walletBalanceDisplay").innerText = "--";
      document.getElementById("walletTxList").innerHTML = `<p style="color:#4a5568; font-size:14px; text-align:center; padding:20px 0;">載入中...</p>`;

      try {
        var res = await fetch(apiUrl + "?action=wallet&userId=" + encodeURIComponent(userProfile.userId));
        var data = await res.json();
        if (data.status !== "success") throw new Error("查詢失敗");

        currentBalance = data.balance || 0;
        document.getElementById("walletBalanceDisplay").innerText = currentBalance;

        const txList = document.getElementById("walletTxList");
        if (!data.transactions || data.transactions.length === 0) {
          txList.innerHTML = `<p style="color:#4a5568; font-size:14px; text-align:center; padding:20px 0;">尚無交易紀錄</p>`;
          return;
        }
        txList.innerHTML = data.transactions.map(tx => `
          <div class="tx-item">
            <div class="tx-left">
              <div class="tx-desc">${tx.desc}</div>
              <div class="tx-time">${tx.time}</div>
            </div>
            <div class="tx-amount ${tx.type === 'credit' ? 'credit' : 'debit'}">
              ${tx.type === 'credit' ? '+' : '-'}$${tx.amount}
            </div>
          </div>
        `).join("");
      } catch (err) {
        console.error(err);
        document.getElementById("walletTxList").innerHTML = `<p style="color:#fc8181; font-size:14px; text-align:center;">載入失敗，請稍後再試</p>`;
      }
    }

    function selectTopup(btn, amount) {
      document.querySelectorAll('.topup-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTopupAmount = amount;
      document.getElementById("customTopupInput").value = "";
    }

    function clearTopupSelection() {
      document.querySelectorAll('.topup-btn').forEach(b => b.classList.remove('selected'));
      selectedTopupAmount = 0;
    }

    async function submitTopup() {
      if (!userProfile) { alert("尚未成功讀取 LINE 身分！"); return; }

      const customVal = parseInt(document.getElementById("customTopupInput").value) || 0;
      const topupAmount = customVal > 0 ? customVal : selectedTopupAmount;

      if (!topupAmount || topupAmount <= 0) {
        alert("⚠️ 請選擇或輸入儲值金額！"); return;
      }

      const btn = document.getElementById("topupSubmitBtn");
      btn.innerText = "申請中...";
      btn.disabled = true;

      try {
        await fetch(apiUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "topup",
            userId: userProfile.userId,
            displayName: userProfile.displayName,
            amount: topupAmount
          })
        });

        alert(`✅ 儲值申請已送出！\n金額：$${topupAmount}\n\n請依照客服指示完成付款後，老闆將為您加值。`);
        document.querySelectorAll('.topup-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById("customTopupInput").value = "";
        selectedTopupAmount = 0;
      } catch (err) {
        alert("申請失敗，請稍後再試！");
      } finally {
        btn.innerText = "申請儲值";
        btn.disabled = false;
      }
    }

    // ===== 歷史訂單 =====
    async function loadHistory() {
      if (!userProfile) return;
      var listEl = document.getElementById("historyList");
      listEl.innerHTML = `<p style="color:#a0aec0; font-size:14px;">載入中...</p>`;
      try {
        var res = await fetch(apiUrl + "?userId=" + encodeURIComponent(userProfile.userId));
        var data = await res.json();
        if (data.status !== "success") { listEl.innerHTML = `<p style="color:#ff6b6b; font-size:14px;">查詢失敗，請稍後再試。</p>`; return; }
        if (!data.orders || data.orders.length === 0) { listEl.innerHTML = `<p style="color:#a0aec0; font-size:14px;">目前還沒有任何訂單紀錄。</p>`; return; }
        listEl.innerHTML = data.orders.map(order => `
          <div style="padding:14px; margin-bottom:10px; background:#1a1f29; border-radius:8px; border:1px solid #2d3748;">
            <div style="color:#718096; font-size:12px; margin-bottom:6px;">${order.time}</div>
            <div style="color:#ffffff; font-weight:700; margin-bottom:4px;">${order.game}　${order.server}</div>
            <div style="color:#a0aec0; font-size:14px;">面額：${order.amount}</div>
            <div style="color:#a0aec0; font-size:14px;">支付方式：${order.payment}</div>
          </div>
        `).join("");
      } catch (error) {
        listEl.innerHTML = `<p style="color:#ff6b6b; font-size:14px;">查詢失敗，請檢查網路連線後再試一次。</p>`;
      }
    }

    initializeLiff();
    // 預設高亮第一個按鈕
    document.querySelectorAll('.top-btn')[0].classList.add('active');
  </script>
</body>
</html>
