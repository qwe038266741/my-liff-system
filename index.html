<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿毛代儲🐼快速下單</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 全域暗黑電競風 */
    body { 
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
      text-align: center; 
      padding: 0 15px 40px 15px; 
      background-color: #0b0c10; 
      color: #e2e8f0; 
      margin: 0;
    }

    /* 頂部精美橫幅 (Banner) */
    .banner-container {
      width: 100%;
      max-width: 440px;
      margin: 20px auto 0 auto;
      background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
      border: 1px solid rgba(6, 199, 85, 0.2);
      border-radius: 16px;
      padding: 25px 20px;
      box-sizing: border-box;
      box-shadow: 0 0 20px rgba(6, 199, 85, 0.1);
    }
    
    .banner-container h2 {
      margin: 0;
      font-size: 24px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-shadow: 0 0 10px rgba(6, 199, 85, 0.4);
    }

    /* LINE 身分區塊 */
    .profile-box {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 15px;
      gap: 12px;
    }
    #pictureUrl { 
      width: 35px; 
      height: 35px;
      border-radius: 50%; 
      display: none; 
      border: 2px solid #06C755;
    }
    #displayName {
      font-size: 14px;
      color: #c5a059; /* 尊爵金 */
      font-weight: 600;
      margin: 0;
    }

    /* 🚦 步驟進度條 (Step Progress Bar) */
    .progress-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 360px;
      margin: 25px auto 10px auto;
      position: relative;
    }
    .progress-bar::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: #1f2833;
      z-index: 1;
    }
    .progress-line-active {
      position: absolute;
      top: 15px;
      left: 0;
      width: 0%; /* 動態控制 */
      height: 2px;
      background-color: #06C755;
      z-index: 2;
      transition: width 0.3s ease;
    }
    .step {
      position: relative;
      z-index: 3;
      text-align: center;
    }
    .step-node {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #1f2833;
      border: 2px solid #45a29e;
      color: #c5a059;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      margin: 0 auto 8px auto;
      transition: all 0.3s ease;
    }
    .step.active .step-node {
      background-color: #0b0c10;
      border-color: #06C755;
      color: #06C755;
      box-shadow: 0 0 10px rgba(6, 199, 85, 0.6);
    }
    .step-text {
      font-size: 12px;
      color: #c5a059;
      font-weight: 600;
    }
    .step.active .step-text {
      color: #ffffff;
    }

    /* 核心主卡片裝飾 */
    .order-box { 
      margin: 15px auto; 
      padding: 25px 20px; 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      border-radius: 16px; 
      max-width: 440px; 
      background: #151a22; 
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); 
      box-sizing: border-box;
    }
    
    /* 📈 項目大圖示按鈕區塊 */
    .game-grid {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }
    .game-card {
      flex: 1;
      border: 2px solid #2d3748;
      border-radius: 12px;
      padding: 15px 10px;
      cursor: pointer;
      background: #0f1319;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .game-card:hover {
      transform: translateY(-3px);
      border-color: #45a29e;
    }
    .game-card.selected {
      border-color: #06C755;
      background: linear-gradient(145deg, #102a1e, #0f1319);
      box-shadow: 0 0 15px rgba(6, 199, 85, 0.2);
    }
    .game-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
    }
    .game-card.selected .game-icon {
      filter: drop-shadow(0 0 8px rgba(6,199,85,0.5));
    }
    .game-title {
      font-size: 15px;
      font-weight: 700;
      color: #94a3b8;
    }
    .game-card.selected .game-title {
      color: #ffffff;
    }

    /* 輸入表單排版 */
    .input-group { margin-top: 20px; text-align: left; }
    .input-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #94a3b8; letter-spacing: 0.5px; }
    
    select, input { 
      width: 100%; 
      padding: 12px 15px; 
      font-size: 15px; 
      border-radius: 8px; 
      background-color: #0b0c10;
      border: 1px solid #2d3748; 
      color: #ffffff;
      transition: all 0.3s ease;
      box-sizing: border-box;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #06C755;
      box-shadow: 0 0 10px rgba(6, 199, 85, 0.3);
    }
    input[readonly] { background-color: #151a22; color: #4a5568; cursor: not-allowed; border-color: #2d3748; }

    .price-hint { margin-top: 8px; font-size: 15px; color: #00ff66; font-weight: 700; text-shadow: 0 0 5px rgba(0,255,102,0.2); }
    
    /* 按鈕美化 */
    button { 
      margin-top: 25px; 
      width: 100%; 
      padding: 14px; 
      background: linear-gradient(90deg, #06b34c, #06C755);
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
      transition: all 0.2s ease; 
    }
    button:hover { 
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(6, 199, 85, 0.5); 
    }
    button:disabled { background: #2d3748; color: #4a5568; box-shadow: none; cursor: not-allowed; }
    .btn-secondary { background: #2d3748; color: #a0aec0; margin-top: 12px; box-shadow: none; }
    .btn-secondary:hover { background: #3a4a63; color: #ffffff; }
  </style>
</head>
<body>

  <!-- 1. 精美橫幅 Banner -->
  <div class="banner-container">
    <h2>🐼 阿毛工作室</h2>
    <div class="profile-box">
      <img id="pictureUrl" src="" alt="Profile Picture">
      <h3 id="displayName">正在驗證 LINE 安全連線...</h3>
    </div>
  </div>

  <!-- 3. 🚦 步驟進度條 -->
  <div class="progress-bar">
    <div class="progress-line-active" id="progressLine"></div>
    <div class="step active" id="stepNode1">
      <div class="step-node">1</div>
      <div class="step-text">選擇商品</div>
    </div>
    <div class="step" id="stepNode2">
      <div class="step-node">2</div>
      <div class="step-text">填寫代儲</div>
    </div>
    <div class="step" id="stepNode3">
      <div class="step-node">3</div>
      <div class="step-text">訂單成立</div>
    </div>
  </div>

  <!-- 第一步卡片面版 -->
  <div id="step1" class="order-box">
    <!-- 4. 📈 項目視覺大圖示按鈕 -->
    <div class="input-group">
      <label>請選擇儲值項目</label>
      <div class="game-grid">
        <div class="game-card" id="cardVal" onclick="selectGameCard('特戰英豪')">
          <div class="game-icon">🎯</div>
          <div class="game-title">特戰英豪</div>
        </div>
        <div class="game-card" id="cardDy" onclick="selectGameCard('抖音')">
          <div class="game-icon">🎵</div>
          <div class="game-title">抖音項目</div>
        </div>
      </div>
    </div>

    <div class="input-group">
      <label>請選擇伺服器/版本</label>
      <select id="serverSelect">
        <option value="" disabled selected>請先點擊上方項目卡片...</option>
      </select>
    </div>

    <div class="input-group" id="amountSelectGroup">
      <label>請選擇面額</label>
      <select id="amountSelect">
        <option value="" disabled selected>請先選擇伺服器...</option>
      </select>
    </div>

    <div class="input-group" id="customAmountGroup" style="display: none;">
      <label id="customAmountLabel">請輸入欲購買數量</label>
      <input type="number" id="customAmountInput" placeholder="請輸入數量" min="1">
      <div class="price-hint" id="customPriceCalc">目前金額：$0</div>
    </div>

    <div class="input-group">
      <label>請選擇支付方式</label>
      <select id="paymentSelect">
        <option value="" disabled selected>請選擇支付方式...</option>
        <option value="網銀轉帳">網銀轉帳 $0-$15</option>
        <option value="LINE好友轉帳">LINE好友轉帳 $0</option>
        <option value="街口轉帳">街口轉帳 $0</option>
        <option value="7-11條碼繳費">7-11條碼繳費 $0</option>
        <option value="全家條碼繳費">全家條碼繳費 $15</option>
        <option value="萊爾富條碼繳費">萊爾富條碼繳費 $15</option>
      </select>
    </div>

    <button onclick="goToStep2()">下一步，填寫資料</button>
  </div>

  <!-- 第二步卡片面版 -->
  <div id="step2" class="order-box" style="display: none;">
    <h3 style="margin-top: 0; color: #06C755; font-weight: 700;">填寫代儲資訊</h3>
    <p id="orderSummary" style="font-size: 14px; color: #a0aec0; font-weight: 600; margin-bottom: 25px; line-height: 1.5; text-align: left; background: #0b0c10; padding: 12px; border-radius: 8px; border: 1px solid #2d3748;"></p>
    
    <div id="dynamicForm"></div>

    <button id="submitBtn" onclick="submitOrder()">確認送出訂單</button>
    <button class="btn-secondary" onclick="backToStep1()">回上一頁修改</button>
  </div>

  <script>
    const myLiffId = "2010516204-8RHWuHLT"; 
    const apiUrl = "https://script.google.com/macros/s/AKfycbyTAce-Ab1ziBxzbX_LMo3cd102KFhv_ABYBx9meo9ZpZVT1iFBNlBJjXlgBEOO28Yr/exec"; 
    let userProfile = null;
    let selectedGame = "";

    const serverOptions = {
      "特戰英豪": ["全服", "菲服"],
      "抖音": ["大陸版", "國際版"]
    };

    const amountOptions = {
      "全服": [
        "16350VP = $4100", "13050VP = $3300", "11000VP = $2700", "9000VP = $2400", 
        "7400VP = $2000", "5350VP = $1400", "3650VP = $1000", "2050VP = $600", "1000VP = $300"
      ],
      "菲服": [
        "【 Riot ID直充 】", "16350VP = $3700", "13050VP = $3000", "11000VP = $2500", 
        "9000VP = $2200", "7400VP = $1800", "5350VP = $1300", "3650VP = $1000", 
        "2050VP = $600", "1000VP = $300", "475VP = $150",
        "【 序號 】", "6710VP = $1450", "3250VP = $800", "1900VP = $500", "1260VP = $350", "600VP = $200", "355VP = $150"
      ]
    };

    const serialAmounts = ["6710VP = $1450", "3250VP = $800", "1900VP = $500", "1260VP = $350", "600VP = $200", "355VP = $150"];

    async function initializeLiff() {
      try {
        await liff.init({ liffId: myLiffId });
        if (liff.isLoggedIn()) {
          userProfile = await liff.getProfile();
          document.getElementById("displayName").innerText = "代儲尊榮會員：" + userProfile.displayName;
          document.getElementById("pictureUrl").src = userProfile.pictureUrl;
          document.getElementById("pictureUrl").style.display = "inline-block";
        } else {
          liff.login();
        }
      } catch (err) {
        console.error("LIFF 初始化失敗", err);
        document.getElementById("displayName").innerText = "安全線路初始化失敗，請重新開啟";
      }
    }

    // 點擊大圖卡選擇項目
    function selectGameCard(game) {
      selectedGame = game;
      document.getElementById("cardVal").classList.remove("selected");
      document.getElementById("cardDy").classList.remove("selected");
      
      if(game === "特戰英豪") document.getElementById("cardVal").classList.add("selected");
      if(game === "抖音") document.getElementById("cardDy").classList.add("selected");

      const serverSelect = document.getElementById("serverSelect");
      serverSelect.innerHTML = '<option value="" disabled selected>請選擇伺服器/版本...</option>';
      document.getElementById("amountSelect").innerHTML = '<option value="" disabled selected>請先選擇伺服器...</option>';
      
      document.getElementById("amountSelectGroup").style.display = "block";
      document.getElementById("customAmountGroup").style.display = "none";
      document.getElementById("customAmountInput").value = "";
      document.getElementById("customPriceCalc").innerText = "目前金額：$0";

      if (serverOptions[game]) {
        serverOptions[game].forEach(server => {
          let option = document.createElement("option");
          option.value = server;
          option.text = server;
          serverSelect.appendChild(option);
        });
      }
    }

    document.getElementById("serverSelect").addEventListener("change", function() {
      const server = this.value;
      const amountSelect = document.getElementById("amountSelect");
      
      amountSelect.innerHTML = '<option value="" disabled selected>請選擇面額...</option>';
      document.getElementById("customAmountInput").value = "";
      document.getElementById("customPriceCalc").innerText = "目前金額：$0";

      if (selectedGame === "抖音") {
        document.getElementById("amountSelectGroup").style.display = "none";
        document.getElementById("customAmountGroup").style.display = "block";
        
        if (server === "大陸版") {
          document.getElementById("customAmountLabel").innerText = "請輸入欲購買鑽石數量 (限100鑽石/$50為單位)";
          document.getElementById("customAmountInput").placeholder = "例如：100, 200, 500...";
        } else if (server === "國際版") {
          document.getElementById("customAmountLabel").innerText = "請輸入欲購買金幣數量 (限140金幣/$50為單位)";
          document.getElementById("customAmountInput").placeholder = "例如：140, 280, 560...";
        }
      } else {
        document.getElementById("amountSelectGroup").style.display = "block";
        document.getElementById("customAmountGroup").style.display = "none";
        
        if (server && amountOptions[server]) {
          amountOptions[server].forEach(amount => {
            let option = document.createElement("option");
            option.value = amount;
            option.text = amount;
            if (amount.startsWith("【")) {
              option.disabled = true;
              option.style.fontWeight = "bold"; 
              option.style.color = "#555";
            }
            amountSelect.appendChild(option);
          });
        }
      }
    });

    document.getElementById("customAmountInput").addEventListener("input", function() {
      const server = document.getElementById("serverSelect").value;
      const val = parseInt(this.value) || 0;
      let price = 0;

      if (server === "大陸版") {
        price = Math.floor(val / 100) * 50;
      } else if (server === "國際版") {
        price = Math.floor(val / 140) * 50;
      }
      document.getElementById("customPriceCalc").innerText = `目前金額：$${price}`;
    });

    function goToStep2() {
      const server = document.getElementById("serverSelect").value;
      const payment = document.getElementById("paymentSelect").value;
      let amount = "";

      if (!selectedGame) {
        alert("⚠️ 請先點擊大卡片選擇儲值項目！"); return;
      }

      if (selectedGame === "抖音") {
        const inputVal = parseInt(document.getElementById("customAmountInput").value) || 0;
        if (inputVal <= 0) { alert("⚠️ 請輸入正確的購買數量！"); return; }
        if (server === "大陸版") {
          if (inputVal % 100 !== 0) { alert("⚠️ 大陸版限制必須以 100 鑽石為單位遞增輸入！"); return; }
          amount = `${inputVal}鑽石 = $${(inputVal / 100) * 50}`;
        } else if (server === "國際版") {
          if (inputVal % 140 !== 0) { alert("⚠️ 國際版限制必須以 140 金幣為單位遞增輸入！"); return; }
          amount = `${inputVal}金幣 = $${(inputVal / 140) * 50}`;
        }
      } else {
        amount = document.getElementById("amountSelect").value;
      }

      if (!server || !amount || !payment) {
        alert("⚠️ 請確認所有選項和面額皆已填寫完整！"); return;
      }

      // 更新進度條視覺
      document.getElementById("progressLine").style.width = "50%";
      document.getElementById("stepNode2").classList.add("active");

      document.getElementById("orderSummary").innerHTML = `🛒 <b>項目：</b>${selectedGame}<br>🌍 <b>版本：</b>${server}<br>💎 <b>面額：</b>${amount}<br>💳 <b>支付：</b>${payment}`;
      const formContainer = document.getElementById("dynamicForm");
      
      if (selectedGame === "特戰英豪") {
        if (server === "全服") {
          formContainer.innerHTML = `
            <div class="input-group"><label>登入方式</label><input type="text" id="loginMethod" value="Riot" readonly></div>
            <div class="input-group"><label>帳號</label><input type="text" id="account" placeholder="請輸入 Riot 帳號"></div>
            <div class="input-group"><label>密碼</label><input type="text" id="password" placeholder="請輸入密碼"></div>
            <div class="input-group"><label>區服</label><input type="text" id="region" placeholder="請輸入區服"></div>
            <div class="input-group"><label>名稱</label><input type="text" id="characterName" placeholder="請輸入遊戲名稱"></div>
          `;
        } else if (server === "菲服") {
          if (serialAmounts.includes(amount)) {
            formContainer.innerHTML = `
              <div style="padding: 15px; color: #a0aec0; font-size: 14px; line-height: 1.6; background:#0b0c10; border-radius:8px; border:1px dashed #4a5568;">
                📦 您選擇的是 <b style="color: #ff9800;">【序號商品】</b>。<br>
                免填遊戲帳密或 Riot ID！<br>
                請點下方按鈕送出，由客服發送支付方式。
              </div>
            `;
          } else {
            formContainer.innerHTML = `
              <div class="input-group"><label>Riot ID</label><input type="text" id="riotId" placeholder="格式如：XXX#XXX"></div>
            `;
          }
        }
      } else if (selectedGame === "抖音") {
        if (server === "大陸版") {
          formContainer.innerHTML = `
            <div class="input-group"><label>抖音號</label><input type="text" id="douyinId" placeholder="請輸入您的大陸版抖音號"></div>
          `;
        } else if (server === "國際版") {
          formContainer.innerHTML = `
            <div class="input-group"><label>綁定電子信箱</label><input type="text" id="douyinEmail" placeholder="請輸入 TikTok 綁定信箱"></div>
            <div class="input-group"><label>密碼</label><input type="text" id="douyinPassword" placeholder="請輸入 TikTok 密碼"></div>
          `;
        }
      }

      formContainer.dataset.resolvedAmount = amount;
      document.getElementById("step1").style.display = "none";
      document.getElementById("step2").style.display = "block";
    }

    function backToStep1() {
      document.getElementById("progressLine").style.width = "0%";
      document.getElementById("stepNode2").classList.remove("active");
      document.getElementById("step1").style.display = "block";
      document.getElementById("step2").style.display = "none";
    }

    async function submitOrder() {
      if (!userProfile) { alert("尚未成功讀取 LINE 身分，無法下單！"); return; }

      const server = document.getElementById("serverSelect").value;
      const formContainer = document.getElementById("dynamicForm");
      const amount = formContainer.dataset.resolvedAmount;
      
      let payload = {
        userId: userProfile.userId,
        displayName: userProfile.displayName,
        game: selectedGame,
        server: server,
        amount: amount,
        payment: document.getElementById("paymentSelect").value
      };

      if (selectedGame === "特戰英豪") {
        if (server === "全服") {
          payload.loginMethod = document.getElementById("loginMethod").value;
          payload.account = document.getElementById("account").value.trim();
          payload.password = document.getElementById("password").value.trim();
          payload.region = document.getElementById("region").value.trim();
          payload.characterName = document.getElementById("characterName").value.trim();

          if(!payload.account || !payload.password || !payload.region || !payload.characterName) {
            alert("⚠️ 請確認所有欄位皆已填寫完整！"); return;
          }
        } else if (server === "菲服") {
          if (!serialAmounts.includes(amount)) {
            payload.riotId = document.getElementById("riotId").value.trim();
            if(!payload.riotId) { alert("⚠️ 請填寫 Riot ID！"); return; }
          } else {
            payload.riotId = "購買序號商品";
          }
        }
      } else if (selectedGame === "抖音") {
        if (server === "大陸版") {
          var douyinId = document.getElementById("douyinId").value.trim();
          if(!douyinId) { alert("⚠️ 請填寫抖音號！"); return; }
          payload.account = douyinId; 
          payload.loginMethod = "抖音號充值";
        } else if (server === "國際版") {
          var email = document.getElementById("douyinEmail").value.trim();
          var pwd = document.getElementById("douyinPassword").value.trim();
          if(!email || !pwd) { alert("⚠️ 請確認信箱與密碼皆已填寫！"); return; }
          payload.account = email;
          payload.password = pwd;
          payload.loginMethod = "信箱登入";
        }
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.innerText = "加密傳送中...";
      submitBtn.disabled = true;

      try {
        await fetch(apiUrl, {
          method: "POST",
          mode: "no-cors", 
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });

        document.getElementById("progressLine").style.width = "100%";
        document.getElementById("stepNode3").classList.add("active");

        alert("🎉 訂單已成功送出！\n客服正在處理中，請稍候。");
        
        // 成功後將進度條與卡片初始化
        document.getElementById("progressLine").style.width = "0%";
        document.getElementById("stepNode2").classList.remove("active");
        document.getElementById("stepNode3").classList.remove("active");
        backToStep1();

      } catch (error) {
        console.error("傳送過程中發生錯誤:", error);
        alert("傳送失敗，請稍後再試！");
      } finally {
        submitBtn.innerText = "確認送出訂單";
        submitBtn.disabled = false;
      }
    }

    initializeLiff();
  </script>
</body>
</html>
